<!DOCTYPE html>
<html>
<head>
    <title>Coach Madness</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start-screen">
    <h1>🏆 Coach Madness 🏆</h1>
    <p>The Ultimate Bag Championship</p>
    <button id="playBtn">Play</button>
</div>

<div id="game-screen" class="hidden">
    <h2 id="roundTitle"></h2>

    <div class="matchup">
        <img id="leftBag">
        <img id="rightBag">
    </div>
</div>

<div id="winner-screen" class="hidden">
    <h1>Champion!</h1>
    <img id="winnerImage">
    <p>Excellent choice.</p>
</div>

<script src="script.js"></script>

</body>
</html>
